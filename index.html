<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8"/>
        <link rel="shortcut icon" href="assets/dashboard.svg">
        <script src="./src/jquery-3.5.1.min.js"></script>
        <script src="./src/jquery-ui/jquery-ui.min.js"></script>
        <script src="./src/passwords.js"></script>
        <script src="./src/dashboard.js"></script>
        <link rel="stylesheet" href="src/dashboard.css">
        <title>Dashboard</title>
    </head>
    <body>
        <div id="dashboard">

            <div class="container">
                <a href="https://calendar.google.com/calendar/b/0/r">
                    <div class="head">
                        Kalender
                    </div>
                </a>
                <div class="content" id="calendar-wrapper">
                </div>
            </div>
            <div class="container">
                <a href="https://www.meistertask.com/app/dashboard">
                    <div class="head">
                        ToDo
                        <span id="task-counter" class="counter"></span>
                    </div>
                </a>
                <div class="content" id="todo-wrapper">
                    
                </div>
            </div>
            <div class="container">
                <div class="content" id="clock-wrapper">
                    <div id="clock"></div>
                    <div id="toggl"><span>CodeClub-Zeit diese Woche: </span><span id="cc-time"></span><span>h</span></div>
                </div>
            </div>
            <div class="container">
                <div class="content" id="apps-wrapper">
                    <!-- CodeClub-->
                    <a href="https://codeclub.de" data-name="CodeClubMG" style="background-image: url(./assets/app_icons/codeclub.png);"></a>
                    <a href="https://iiigel.de" data-name="Iiigel" style="background-image: url(./assets/app_icons/iiigel.png);"></a>
                    <a href="https://gag-module.de" data-name="GaG-Module" style="background-image: url(./assets/app_icons/gag-module.png);"></a>
                    <a href="#" data-name="CodingSpace" style="background-image: url(./assets/app_icons/codingspace.png);"></a>
                    
                    <!-- Hochschule -->
                    <a href="https://moodle.hsnr.de/login/index.php" data-name="Moodle" style="background-image: url(./assets/app_icons/moodle.png);"></a>
                    <a href="https://go.ide3.de" data-name="IDE3" style="background-image: url(./assets/app_icons/ide3.png);"></a>
                    <a href="https://git.ide3.de" data-name="Git HSNR" style="background-image: url(./assets/app_icons/gitlab.png);"></a>
                    <a href="https://mm.ide3.de/ide3/" data-name="Mattermost" style="background-image: url(./assets/app_icons/mattermost.png);"></a>
                    <a href="https://hio.hsnr.de/" data-name="HIO" style="background-image: url(./assets/app_icons/hio.png);"></a>

                    <!-- Sonstiges -->
                    <a href="https://github.com" data-name="GitHub" style="background-image: url(./assets/app_icons/github.png);"></a>
                    <a href="https://www.typingclub.com/sportal/" data-name="TypingClub" style="background-image: url(./assets/app_icons/typingclub.jpg);"></a>
                    <a href="https://docs.google.com" data-name="Docs" style="background-image: url(./assets/app_icons/docs.png);"></a>
                    <a href="https://drive.google.com" data-name="Drive" style="background-image: url(./assets/app_icons/drive.png);"></a>
                    <a href="https://track.toggl.com/timer?utm_source=toggl-button&utm_medium=referral.de" data-name="Toggl" style="background-image: url(./assets/app_icons/toggl.png);"></a>
                    <a href="https://web.magentatv.de/EPG/" data-name="MagentaTV" style="background-image: url(./assets/app_icons/magentatv.png);"></a>
                    <a href="https://discord.com/app/" data-name="Discord" style="background-image: url(./assets/app_icons/discord.png);"></a>
                </div>
            </div>
        </div>

        <iframe id="radio-frame" scrolling="no" frameborder="no"></iframe>

        <div id="reload-bg"></div>
        
    </body>
</html>
