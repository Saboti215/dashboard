<!DOCTYPE html>
<html lang="de">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8"/>
        <link rel="shortcut icon" href="assets/dashboard.svg">
        <script src="./src/jquery-3.5.1.min.js"></script>
        <script src="./src/jquery-ui/jquery-ui.min.js"></script>
        <script src="./src/passwords.js"></script>
        <script src="./src/dashboard.js"></script>
        <link rel="stylesheet" href="src/dashboard.css">
        <title>Dashboard</title>
    </head>
    <body>
        <!-- Background Overlay for modern aesthetic -->
        <div id="bg-overlay"></div>

        <div id="dashboard">
            <!-- Left Side: Calendar -->
            <div class="container" id="calendar-container">
                <a href="https://calendar.google.com/calendar/b/0/r" target="_blank" class="container-header-link">
                    <div class="head">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        Kalender
                    </div>
                </a>
                <div class="content" id="calendar-wrapper">
                </div>
            </div>

            <!-- Right Side Stack: Clock & Apps -->
            <div class="right-column">
                <!-- Clock Widget -->
                <div class="container clock-container">
                    <div class="content" id="clock-wrapper">
                        <div id="clock">
                            <div id="clock-time">--:--:--</div>
                            <div id="clock-date">Laden...</div>
                        </div>
                    </div>
                </div>

                <!-- Search Widget -->
                <div class="container" id="search-container">
                    <div class="content" id="search-wrapper">
                        <form id="search-form" action="https://search.brave.com/search" method="get">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="search-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
                            </svg>
                            <input type="search" name="q" id="search-input" placeholder="Mit Brave suchen..." autofocus autocomplete="off">
                        </form>
                        <a id="gemini-btn" href="https://gemini.google.com/app" title="Neuer Gemini-Chat">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3l1.912 5.813L20 10.5l-6.088 1.687L12 18l-1.912-5.813L4 10.5l6.088-1.687L12 3z" />
                            </svg>
                        </a>
                    </div>
                </div>

                <!-- Apps Widget -->
                <div class="container" id="apps-container">
                    <div class="head">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                        Lesezeichen
                    </div>
                    <div class="content" id="apps-wrapper">
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Music Player Widget -->
        <div id="radio-panel">
            <div class="radio-header">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="radio-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                <span>TuneIn Radio</span>
            </div>
            <div class="radio-content">
                <iframe id="radio-frame" scrolling="no" frameborder="no"></iframe>
            </div>
        </div>

        <button id="radio-toggle" title="Radio Player">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        </button>

        <!-- Meeting Container Placeholder (will be animated in by JS) -->
        <div id="meeting-portal"></div>

        <button id="meetings-toggle" title="Meetings verwalten">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </button>

        <!-- Meetings Management Modal -->
        <div id="meetings-modal">
            <div id="meetings-modal-backdrop"></div>
            <div id="meetings-modal-card">
                <div class="modal-header">
                    <span>Meetings verwalten</span>
                    <button type="button" id="meetings-modal-close" title="Schließen">&times;</button>
                </div>

                <div id="meetings-list"></div>

                <form id="meeting-form">
                    <input type="hidden" id="meeting-id">
                    <input type="hidden" id="meeting-recurrence" value="weekly">

                    <div class="form-row">
                        <label for="meeting-name">Name</label>
                        <input type="text" id="meeting-name" required>
                    </div>

                    <div class="form-row form-row-split">
                        <div>
                            <label for="meeting-type">Typ</label>
                            <select id="meeting-type">
                                <option value="zoom">Zoom</option>
                                <option value="teams">MS Teams</option>
                            </select>
                        </div>
                        <div>
                            <label for="meeting-password">Passwort (optional)</label>
                            <input type="text" id="meeting-password" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="meeting-link">Link</label>
                        <input type="url" id="meeting-link" placeholder="https://..." required>
                    </div>

                    <div class="form-row form-row-split">
                        <div>
                            <label for="meeting-start">Start</label>
                            <input type="time" id="meeting-start" required>
                        </div>
                        <div>
                            <label for="meeting-end">Ende</label>
                            <input type="time" id="meeting-end" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Wiederholung</label>
                        <div class="segmented" id="recurrence-toggle">
                            <button type="button" data-value="weekly" class="active">Wöchentlich</button>
                            <button type="button" data-value="once">Einmalig</button>
                        </div>
                    </div>

                    <div class="form-row" id="weekday-row">
                        <label for="meeting-weekday">Wochentag</label>
                        <select id="meeting-weekday">
                            <option value="1">Montag</option>
                            <option value="2">Dienstag</option>
                            <option value="3">Mittwoch</option>
                            <option value="4">Donnerstag</option>
                            <option value="5">Freitag</option>
                            <option value="6">Samstag</option>
                            <option value="0">Sonntag</option>
                        </select>
                    </div>

                    <div class="form-row" id="date-row" style="display: none;">
                        <label for="meeting-date">Datum</label>
                        <input type="date" id="meeting-date">
                    </div>

                    <div class="form-actions">
                        <button type="button" id="meeting-form-cancel">Neu / Zurücksetzen</button>
                        <button type="submit" id="meeting-form-submit">Speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
