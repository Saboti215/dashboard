<!DOCTYPE html>
<html lang="de">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8"/>
        <link rel="shortcut icon" href="assets/dashboard.svg">
        <script src="./src/i18n.js"></script>
        <script src="./src/pomodoro-logic.js"></script>
        <script src="./src/quotes-data.js"></script>
        <script src="./src/extras.js"></script>
        <!-- Vendored canvas-confetti (https://github.com/catdad/canvas-confetti), used by the
             "Top 3 tasks" widget (src/dashboard.js's taskWidget) when all three tasks are checked
             off. Exposes a single global: window.confetti. -->
        <script src="./src/canvas-confetti.min.js"></script>
        <script src="./src/calc.js"></script>
        <script src="./src/stores.js"></script>
        <script src="./src/pomodoro-ui.js"></script>
        <script src="./src/dashboard.js"></script>
        <link rel="stylesheet" href="src/dashboard.css">
        <title>Dashboard</title>
        <!-- Alpine's CSP-compliant build — required because this extension relies on Manifest
             V3's default script-src 'self' CSP (no custom content_security_policy in
             manifest.json), which blocks the regular Alpine build's use of new Function(). Must
             stay the LAST script tag: Alpine.data()/Alpine.store() registration happens inside
             alpine:init listeners above, which Alpine dispatches during its own auto-start.
             "defer" is required since all scripts sit in <head>: it delays Alpine until the whole
             document (including <body>) has been parsed, while still running before
             DOMContentLoaded and after every preceding (non-deferred) script above has already
             registered its alpine:init listener. -->
        <script defer src="./src/alpine-csp.min.js"></script>
    </head>
    <body x-data="dashboardRoot" x-cloak x-on:keydown.escape.window="onEscape">
        <!-- Background Overlay for modern aesthetic -->
        <div id="bg-overlay"></div>

        <div id="dashboard" x-bind:class="$store.dashboard.dashboardGridClass">
            <!-- Left Column: Calendar (capped height, not full-column anymore) + News below it. -->
            <div class="left-column">
                <!-- Calendar. Hidden by loadCalendar() until a calendar embed is configured in
                     Settings. -->
                <div class="container" id="calendar-container" x-bind:class="$store.dashboard.calendarContainerClass">
                    <a href="https://calendar.google.com/calendar/b/0/r" target="_blank" class="container-header-link">
                        <div class="head">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span data-i18n="widgets.calendar">Kalender</span>
                        </div>
                    </a>
                    <div class="content" id="calendar-wrapper" x-html="$store.dashboard.calendarHtml">
                    </div>
                </div>

                <!-- News card: latest headlines from the RSS/Atom feeds configured in Settings.
                     Fetched lazily (src/stores.js's loadRss(), called from applyEverything()) so
                     it never blocks the rest of the dashboard from rendering; hides itself entirely
                     when no feeds are configured or the feature is disabled. -->
                <div class="container" id="news-container" x-bind:class="$store.dashboard.rssContainerClass">
                    <div class="head">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h11a2 2 0 012 2v1m-6 9h6m-6-4h6m-6-4h2M5 8h1m10 12a2 2 0 002-2v-9a2 2 0 00-2-2H7a2 2 0 00-2 2v9a2 2 0 002 2z" />
                        </svg>
                        <span data-i18n="widgets.news">News</span>
                    </div>
                    <div class="content" id="news-wrapper">
                        <div class="news-empty" x-show="$store.dashboard.rssErrorText" x-text="$store.dashboard.rssErrorText"></div>
                        <!-- Keyed by array index rather than item.link: some feeds legitimately list
                             the same article URL more than once (e.g. a text and a video teaser both
                             pointing at the same page), and Alpine's x-for reorder-diffing crashes on
                             duplicate keys. rssItems is always replaced wholesale (never patched), so
                             the index is a safe, always-unique key here. -->
                        <template x-for="(item, index) in $store.dashboard.rssItems" x-bind:key="index">
                            <a class="news-item" x-bind:href="item.link" target="_blank" rel="noopener">
                                <span class="news-item-title" x-text="item.title"></span>
                                <span class="news-item-source" x-text="item.source"></span>
                            </a>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Right Column: Hero (Clock + Search), Bookmarks, Today -->
            <div class="right-column">
                <!-- Hero: Clock + Search grouped so they can be centered together (no-calendar
                     full-width layout, Zen mode). -->
                <div class="hero">
                    <!-- Clock Widget -->
                    <div class="container clock-container">
                        <div class="content" id="clock-wrapper">
                            <div id="clock">
                                <div id="clock-time" x-text="$store.dashboard.clock.time">--:--:--</div>
                                <div id="clock-date" x-text="$store.dashboard.clock.date">...</div>
                                <!-- Shown only once a name is set in Settings -->
                                <div id="greeting" x-show="$store.dashboard.hasGreeting" x-text="$store.dashboard.greetingText"></div>
                                <!-- Extra timezones, configured in Settings -> World clock; hidden via
                                     feature-hidden when a slot isn't set to a zone. -->
                                <div class="world-clock">
                                    <div id="world-clock-1" class="feature-hidden" x-bind:class="$store.dashboard.worldClock1Class" x-text="$store.dashboard.worldClock1Text"></div>
                                    <div id="world-clock-2" class="feature-hidden" x-bind:class="$store.dashboard.worldClock2Class" x-text="$store.dashboard.worldClock2Text"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Search Widget: engine is configurable in Settings -->
                    <div class="container" id="search-container">
                        <div class="content" id="search-wrapper">
                            <form id="search-form" action="https://search.brave.com/search" method="get" x-bind:action="$store.dashboard.searchAction" x-on:submit="onSearchSubmit">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="search-icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
                                </svg>
                                <input type="search" name="q" id="search-input" autofocus autocomplete="off" x-ref="searchInput" x-bind:name="$store.dashboard.searchParam" x-bind:placeholder="$store.dashboard.searchPlaceholder" x-on:input="onSearchInput" x-on:keydown.down.prevent="highlightNextBookmarkMatch" x-on:keydown.up.prevent="highlightPrevBookmarkMatch">
                            </form>
                            <!-- Spotlight search: shows the live result of an offline math expression
                                 (src/calc.js) typed into the search bar above; hidden otherwise. -->
                            <div id="search-math-result" x-bind:class="mathResultVisibleClass" x-text="mathResultText"></div>
                            <!-- Spotlight bookmark search: up to 5 bookmarks whose name matches the query,
                                 navigable with Up/Down + Enter (see onSearchSubmit) or a plain click.
                                 Suppressed while a math expression is showing (see bookmarkMatches). -->
                            <div id="search-bookmark-suggestions" x-show="hasBookmarkMatches">
                                <template x-for="(match, index) in bookmarkMatches" x-bind:key="index">
                                    <a class="search-suggestion-row" x-bind:href="match.href" x-bind:class="match.rowClass" x-text="match.name"></a>
                                </template>
                            </div>
                            <a id="ai-btn" href="https://gemini.google.com/app" data-i18n-title="ai.title" title="Neuer KI-Chat" x-bind:href="$store.dashboard.aiHref">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3l1.912 5.813L20 10.5l-6.088 1.687L12 18l-1.912-5.813L4 10.5l6.088-1.687L12 3z" />
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Bookmarks Widget, populated from the browser's bookmarks bar -->
                <div class="container" id="apps-container">
                    <div class="head">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                        <span data-i18n="widgets.bookmarks">Lesezeichen</span>
                    </div>
                    <div class="content" id="apps-wrapper">
                        <template x-for="cat in $store.dashboard.bookmarkCategories" x-bind:key="cat.title">
                            <div class="app-category">
                                <div class="category-title" x-text="cat.title"></div>
                                <div class="app-grid">
                                    <template x-for="link in cat.links" x-bind:key="link.href">
                                        <a x-bind:href="link.href" x-bind:data-name="link.name" x-bind:style="link.style"></a>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- "Today" card: weather, public holiday, quote of the day. Each row is toggled
                     independently in Settings; the whole card hides itself (src/extras.js) when
                     none of the three are configured/enabled. -->
                <div class="container" id="today-container" x-bind:class="$store.dashboard.todayContainerClass">
                    <div class="head">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="head-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2zM8 15h.01M12 15h.01M16 15h.01M8 18h.01M12 18h.01" />
                        </svg>
                        <span data-i18n="widgets.today">Heute</span>
                    </div>
                    <!-- Two-column layout once the tasks widget is enabled (see todayLayoutClass);
                         a single flex column otherwise, unchanged from before. -->
                    <div class="content" id="today-wrapper" x-bind:class="$store.dashboard.todayLayoutClass">
                        <div id="today-left">
                            <div class="today-row" id="weather-widget" x-bind:class="$store.dashboard.weatherWidgetClass">
                                <span id="weather-icon" class="today-icon" x-html="$store.dashboard.weatherIconHtml"></span>
                                <span id="weather-text" x-text="$store.dashboard.weatherText"></span>
                            </div>
                            <div class="today-row" id="holiday-widget" x-bind:class="$store.dashboard.holidayWidgetClass">
                                <span class="today-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </span>
                                <span id="holiday-text" x-text="$store.dashboard.holidayText"></span>
                            </div>
                            <div class="today-row" id="quote-widget" x-bind:class="$store.dashboard.quoteWidgetClass">
                                <span class="today-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h6m-9 8l2.5-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-6.5L11 20z" />
                                    </svg>
                                </span>
                                <div>
                                    <div id="quote-text" x-text="$store.dashboard.quoteText"></div>
                                    <div id="quote-author" x-text="$store.dashboard.quoteAuthor"></div>
                                </div>
                            </div>
                        </div>

                        <!-- "Top 3 tasks" widget: today's top priorities. Own Alpine component
                             (taskWidget, src/dashboard.js) since its state (task text/done, daily
                             reset, confetti-on-completion) is unrelated to the rest of the store.
                             Persisted under its own chrome.storage.sync key ("dailyTasks"), separate
                             from the `settings` object — only whether this widget is SHOWN is a
                             setting (tasksEnabled). -->
                        <div id="today-tasks" x-data="taskWidget" x-bind:class="$store.dashboard.tasksWidgetClass">
                            <div class="today-tasks-title" data-i18n="widgets.tasks">Fokus heute</div>
                            <template x-for="(task, index) in tasks" x-bind:key="index">
                                <div class="task-item">
                                    <input type="checkbox" x-bind:checked="task.done" x-bind:data-index="index" x-on:change="toggleTask">
                                    <input type="text" placeholder="Aufgabe ..." data-i18n-placeholder="tasks.placeholder" x-bind:value="task.text" x-bind:data-index="index" x-on:input="updateTaskText">
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Music Player Widget. Hidden entirely (feature-hidden) when disabled in Settings. -->
        <div id="radio-panel" x-bind:class="$store.dashboard.radioClass">
            <div class="radio-header">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="radio-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                <span data-i18n="radio.panelTitle">TuneIn Radio</span>
            </div>
            <div class="radio-content">
                <iframe id="radio-frame" scrolling="no" frameborder="no" x-bind:src="$store.dashboard.radioFrameSrc"></iframe>
            </div>
        </div>

        <button id="radio-toggle" data-i18n-title="radio.toggleTitle" title="Radio Player" x-bind:class="$store.dashboard.radioClass" x-on:click="toggleRadioPanel">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
            </svg>
        </button>

        <!-- Floating Pomodoro Timer Widget. The background service worker (src/background.js) is
             the actual timekeeper, so this keeps counting/notifying even while this panel is
             closed or the tab isn't open at all; this is just the view + remote control. -->
        <div id="pomodoro-panel" x-bind:class="$store.dashboard.pomodoroPanelClass">
            <div class="pomodoro-header">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="pomodoro-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="pomodoro-phase" x-text="$store.dashboard.pomodoro.phaseLabel">Arbeiten</span>
                <button type="button" id="pomodoro-open-window" data-i18n-title="pomodoro.openWindow" title="In eigenem Fenster öffnen" x-on:click="openPomodoroWindow">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                </button>
            </div>
            <div id="pomodoro-time" x-text="$store.dashboard.pomodoro.timeText">25:00</div>
            <div id="pomodoro-round" x-text="$store.dashboard.pomodoro.roundLabel"></div>
            <div class="pomodoro-controls">
                <button type="button" id="pomodoro-play-pause" class="btn btn-primary" x-bind:class="$store.dashboard.pomodoroPlayPauseClass" x-text="$store.dashboard.pomodoro.playPauseLabel" x-on:click="playPause">Start</button>
                <button type="button" id="pomodoro-skip" data-i18n-title="pomodoro.skip" title="Überspringen" x-on:click="skip">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                    </svg>
                </button>
                <button type="button" id="pomodoro-reset" data-i18n-title="pomodoro.reset" title="Zurücksetzen" x-on:click="reset">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>

        <button id="pomodoro-toggle" data-i18n-title="pomodoro.toggleTitle" title="Pomodoro-Timer" x-bind:class="$store.dashboard.pomodoroToggleClass" x-on:click="togglePomodoroPanel">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="pomodoro-badge" x-bind:class="$store.dashboard.pomodoroBadgeClass" x-text="$store.dashboard.pomodoro.timeText"></span>
        </button>

        <!-- Meeting Container Placeholder. Hidden entirely (feature-hidden) when disabled in
             Settings; ".visible" + the card inside only appear while a meeting is active. -->
        <div id="meeting-portal" x-bind:class="$store.dashboard.meetingPortalClass">
            <template x-if="$store.dashboard.activeMeeting">
                <div class="meeting-card" id="active-meeting">
                    <div class="meeting-header">
                        <span class="pulse-dot"></span>
                        <span class="meeting-badge" x-text="$store.dashboard.activeMeetingBadge"></span>
                    </div>
                    <div class="meeting-title" x-text="$store.dashboard.activeMeeting.name"></div>
                    <div class="meeting-time" x-text="$store.dashboard.activeMeetingTime"></div>
                    <button class="meeting-btn" id="join-meeting-btn" x-on:click="joinActiveMeeting">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="btn-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        <span x-text="$store.dashboard.joinMeetingLabel"></span>
                    </button>
                </div>
            </template>
        </div>

        <button id="meetings-toggle" data-i18n-title="meetings.toggleTitle" title="Meetings verwalten" x-bind:class="$store.dashboard.meetingsToggleClass" x-on:click="openMeetings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </button>

        <button id="settings-toggle" data-i18n-title="settings.toggleTitle" title="Einstellungen" x-on:click="openSettings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        <!-- Zen mode: hides every secondary widget/button, leaving only the background, clock, and
             search bar. Also toggled via Escape (see the body's x-on:keydown.escape.window above);
             this button stays visible even in zen mode (see .zen-mode CSS) so there's always a way
             back without touching the keyboard. -->
        <button id="zen-toggle" data-i18n-title="zen.toggleTitle" title="Zen-Modus" x-bind:class="$store.dashboard.zenToggleClass" x-on:click="toggleZenMode">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        <!-- Meetings Management Modal -->
        <div class="modal" id="meetings-modal" x-bind:class="$store.dashboard.meetingsModalClass">
            <div class="modal-backdrop" x-on:click="closeMeetings"></div>
            <div class="modal-card">
                <div class="modal-header">
                    <span data-i18n="meetings.modalTitle">Meetings verwalten</span>
                    <button type="button" class="modal-close" data-i18n-title="close" title="Schließen" x-on:click="closeMeetings">&times;</button>
                </div>

                <div id="meetings-list">
                    <div class="meetings-empty" x-show="$store.dashboard.noMeetings" data-i18n="meetings.empty"></div>
                    <template x-for="meeting in $store.dashboard.meetingRows" x-bind:key="meeting.id">
                        <div class="meeting-row">
                            <div class="meeting-row-info">
                                <div class="meeting-row-name" x-text="meeting.name"></div>
                                <div class="meeting-row-meta" x-text="meeting.metaText"></div>
                            </div>

                        <div class="settings-subfields" id="settings-desk-details" x-show="settingsForm.deskEnabled">
                            <div class="form-row">
                                <label for="settings-desk-interval" data-i18n="settings.wellnessInterval">Intervall (Min.)</label>
                                <input type="number" id="settings-desk-interval" min="1" max="480" data-field="deskIntervalMinutes" x-bind:value="settingsForm.deskIntervalMinutes" x-on:input="updateSettingsField">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="settings-form-cancel" class="btn btn-secondary" data-i18n="settings.cancel" x-on:click="cancelSettings">Abbrechen</button>
                        <button type="submit" id="settings-form-submit" class="btn btn-primary" data-i18n="settings.save">Speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
